name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write   # Required for trusted publishing
  contents: read

jobs:
  version-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Block release if not above PyPI max
        run: |
          pip install packaging
          python - <<'PY'
          import json, urllib.request, sys, tomllib
          from packaging.version import Version
          with open("pyproject.toml", "rb") as f:
              local = Version(tomllib.load(f)["project"]["version"])
          try:
              data = json.load(urllib.request.urlopen(
                  "https://pypi.org/pypi/inav-toolkit/json", timeout=10))
              pypi_max = max(Version(v) for v in data["releases"])
          except Exception as e:
              print(f"Could not reach PyPI ({e}); skipping guard.")
              sys.exit(0)
          print(f"local={local}  pypi_max={pypi_max}")
          if local <= pypi_max:
              sys.exit(f"REFUSING: {local} is not greater than PyPI max {pypi_max}")
          print("OK: version is ahead of PyPI.")
          PY

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[test]"

      - name: Generate test fixtures
        run: python tests/generate_fixtures.py

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  publish:
    runs-on: ubuntu-latest
    needs: [test, version-guard]
    environment:
      name: pypi
      url: https://pypi.org/project/inav-toolkit/
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(python -c "from inav_toolkit import __version__; print(__version__)")
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: Tag ($TAG_VERSION) does not match package version ($PKG_VERSION)"
            exit 1
          fi

      - name: Build wheel and sdist
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
